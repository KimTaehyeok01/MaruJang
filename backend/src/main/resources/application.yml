spring:
  application:
    name: marujang
  config:
    import: optional:application-secret.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/marujang}
    username: ${DB_USERNAME:marujang}
    password: ${DB_PASSWORD:marujang}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
